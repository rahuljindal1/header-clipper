<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="styles.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <title>Header Clipper</title>
    </head>
    <body>
        <div class="header-bar">
            <i class="fas fa-shield-alt"></i>
            <div class="title">ScriptSense — Header Clipper</div>
            <div class="session-timer" id="sessionTimer"><i class="fas fa-clock"></i> <span id="sessionTime">--:--:--</span></div>
        </div>

        <div class="hint">
            Only header names are shown. Click the copy icon to copy the hidden value for the current active tab.
        </div>

        <div class="controls">
            <button id="clearBtn"><i class="fas fa-trash-alt"></i> Clear</button>
            <button id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            <label class="toggle-label" title="When on, copies the full value including 'Bearer ' prefix">
                <input type="checkbox" id="bearerToggle" />
                <span>Include Bearer</span>
            </label>
        </div>

        <div id="toast" class="toast"></div>

        <div class="settings-section">
            <div class="settings-toggle" id="settingsToggle">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
                <i class="fas fa-chevron-down settings-chevron" id="settingsChevron"></i>
            </div>
            <div class="settings-body" id="settingsBody" style="display: none">
                <div class="settings-row">
                    <label for="ttlInput">Auto-clear after (min)</label>
                    <input type="number" id="ttlInput" min="0" placeholder="0" />
                </div>
                <div class="settings-row">
                    <label for="maxCountInput">Max traces</label>
                    <input type="number" id="maxCountInput" min="0" placeholder="0" />
                </div>
                <div class="settings-row">
                    <label for="minHitsInput">Min hit count</label>
                    <input type="number" id="minHitsInput" min="0" placeholder="0" />
                </div>
                <div class="settings-hint">Set to 0 or leave empty for no limit.</div>
            </div>
        </div>

        <div class="content">
            <div id="container" class="container">
                <div class="small">Loading…</div>
            </div>

            <div id="responseTraceContainer" class="container"></div>
        </div>

        <script src="mock.js"></script>
        <script defer src="popup.js"></script>
    </body>
</html>
